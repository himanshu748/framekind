<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" aria-labelledby="title desc" role="img" viewBox="0 0 1200 620"><title id="title">FrameKind on-device architecture</title><desc id="desc">An image stays in the browser, passes to a dedicated worker running YOLOS Tiny through ONNX Runtime Web, then returns detections to an editable alt-text draft and benchmark.</desc><defs><marker id="arrow" markerHeight="8" markerWidth="8" orient="auto-start-reverse" refX="8" refY="5" viewBox="0 0 10 10"><path fill="#0b4de8" d="M 0 0 L 10 5 L 0 10 z"/></marker><style>.title{font:700 42px Inter,Arial,sans-serif;fill:#080b12}.sub{font:400 19px Inter,Arial,sans-serif;fill:#4f5968}.label{font:700 22px Inter,Arial,sans-serif;fill:#080b12}.small{font:400 16px Inter,Arial,sans-serif;fill:#4f5968}.blue{stroke-width:2}.box{fill:#fff;stroke:#cfd6df}.box,.coral{stroke-width:2}.blue{fill:#eef4ff;stroke:#0b4de8}.coral{fill:#fff7f6;stroke:#ff655d}.line{fill:none;stroke:#0b4de8;stroke-width:3;marker-end:url(#arrow)}</style></defs><rect width="1200" height="620" fill="#fff"/><text x="60" y="70" class="title">Everything important stays on the device.</text><text x="60" y="105" class="sub">Only open model weights are fetched and cached; the selected image is never uploaded for inference.</text><rect width="230" height="150" x="60" y="190" class="box" rx="8"/><text x="88" y="240" class="label">Browser UI</text><text x="88" y="278" class="small">Image in memory</text><text x="88" y="307" class="small">Human review</text><path d="M 290 265 L 385 265" class="line"/><rect width="360" height="210" x="390" y="160" class="blue" rx="8"/><text x="425" y="210" class="label">Dedicated Web Worker</text><text x="425" y="250" class="small">Transformers.js pipeline</text><text x="425" y="280" class="small">ONNX Runtime Web · WASM</text><text x="425" y="310" class="small">YOLOS Tiny · FP32 / UINT8</text><text x="425" y="340" class="small">Inference and benchmark timing</text><path d="M 750 265 L 845 265" class="line"/><rect width="290" height="150" x="850" y="190" class="coral" rx="8"/><text x="882" y="240" class="label">Grounded result</text><text x="882" y="278" class="small">Boxes + confidence</text><text x="882" y="307" class="small">Editable spatial draft</text><path d="M 570 370 L 570 440" class="line"/><rect width="360" height="115" x="390" y="445" class="box" rx="8"/><text x="425" y="490" class="label">Optimization evidence</text><text x="425" y="526" class="small">Median latency · load time · size · agreement</text></svg>